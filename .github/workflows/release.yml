name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Build universal binary
        run: SIGNING_MODE=adhoc ARCHES="arm64 x86_64" ./Scripts/package_app.sh release

      - name: Package
        run: |
          source version.env
          zip -r "SpotBar-${MARKETING_VERSION}.zip" SpotBar.app

      - name: Extract release notes
        id: notes
        run: |
          source version.env
          NOTES=$(awk "/^## \[${MARKETING_VERSION}\]/,/^## \[/" CHANGELOG.md | sed '$d' | sed '1d')
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.notes.outputs.notes }}
          files: SpotBar-*.zip

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          source version.env
          ZIP="SpotBar-${MARKETING_VERSION}.zip"
          SHA=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          TAP_DIR=$(mktemp -d)
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/alirezas/homebrew-tap.git" "$TAP_DIR"
          sed -i '' "s/version \".*\"/version \"${MARKETING_VERSION}\"/" "$TAP_DIR/Casks/spotbar.rb"
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" "$TAP_DIR/Casks/spotbar.rb"
          cd "$TAP_DIR"
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -am "Update SpotBar to ${MARKETING_VERSION}"
          git push origin main
